<!DOCTYPE html>
<html>
  <head>
    <style>
      body { width: 320px; padding: 10px; font-family: sans-serif; background: #0f172a; color: white; }
      textarea { width: 100%; height: 80px; margin-bottom: 10px; background: #1e293b; color: white; border: 1px solid #334155; padding: 5px; box-sizing: border-box; }
      button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; cursor: pointer; font-weight: bold; }
      #result { margin-top: 15px; font-size: 13px; line-height: 1.4; color: #cbd5e1; }
    </style>
  </head>
  <body>
    <h3>🛡️ Xist Scanner</h3>
    <textarea id="scanInput" placeholder="Paste URL or text..."></textarea>
    <button id="scanBtn">Scan</button>
    <div id="result"></div>
    <script src="popup.js"></script>
  </body>
</html>
